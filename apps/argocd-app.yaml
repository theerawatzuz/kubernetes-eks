apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/theerawatzuz/kubernetes-eks
    targetRevision: HEAD
    path: services/argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
