apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/theerawatzuz/kubernetes-eks
    targetRevision: HEAD
    path: namespaces

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
