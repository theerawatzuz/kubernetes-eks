---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-load-balancer-controller
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://aws.github.io/eks-charts
    chart: aws-load-balancer-controller
    targetRevision: 1.14.0

    helm:
      values: |
        clusterName: sre-demo
        serviceAccount:
          create: false
          name: aws-load-balancer-controller
          annotations: 
            eks.amazonaws.com/role-arn: arn:aws:iam::281789399995:role/eksctl-sre-demo-addon-iamserviceaccount-kube--Role1-U6NZBEx00vzo

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
